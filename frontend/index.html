<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#f5f8ff" />
    <!-- Lets Chromium use the mic / Web Speech when the document is first-class HTTPS. -->
    <meta http-equiv="Permissions-Policy" content="microphone=(self)" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!--
      Welcome-screen heading uses "Fredoka" — rounded, soft, with curves
      that read like pipe fittings and water droplets. We pull weights
      500/600/700 so the heading has options, and keep display=swap so
      the first paint can use a fallback while the font streams in.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>bluebot Assistant</title>
  </head>
  <body class="bg-[#f5f8ff]">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
